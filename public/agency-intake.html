<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>エステ魂 自動更新ツール 入稿フォーム</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; background:#f4f5f7; color:#222; margin:0; padding:24px; }
  .card { max-width:640px; margin:0 auto; background:#fff; border-radius:12px; padding:28px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
  h1 { font-size:20px; margin:0 0 6px; }
  .sub { color:#666; font-size:13px; margin:0 0 20px; }
  .grp { font-weight:bold; margin:22px 0 8px; padding-bottom:4px; border-bottom:2px solid #eee; }
  label { display:block; font-size:14px; margin:14px 0 4px; font-weight:600; }
  .req { color:#c0392b; font-size:12px; }
  .hint { color:#888; font-size:12px; font-weight:400; }
  input[type=text], input[type=email], input[type=tel] { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:15px; }
  .radios { display:flex; gap:18px; margin-top:6px; }
  .radios label { display:flex; align-items:center; gap:6px; font-weight:400; margin:0; }
  .hp { position:absolute; left:-9999px; }
  button { margin-top:26px; width:100%; padding:14px; background:#1a73e8; color:#fff; border:0; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; }
  button:disabled { background:#9bbcf0; }
  .msg { margin-top:16px; padding:12px; border-radius:6px; display:none; font-size:14px; }
  .msg.err { background:#fdecea; color:#b71c1c; display:block; }
  .msg.ok { background:#e8f5e9; color:#1b5e20; display:block; }
</style>
</head>
<body>
<div class="card">
  <h1>エステ魂 自動更新ツール 入稿フォーム</h1>
  <p class="sub">代理店様向け。以下をご入力のうえ送信してください。<span class="req">＊は必須</span></p>
  <form id="f">
    <div class="grp">代理店情報</div>
    <label>入稿代理店名 <span class="req">＊</span></label>
    <input type="text" name="agency_name" required>
    <label>代理店担当者名 <span class="req">＊</span></label>
    <input type="text" name="agency_rep" required>
    <label>代理店担当者連絡先 <span class="req">＊</span></label>
    <input type="tel" name="agency_contact" required>
    <label>代理店担当者メールアドレス <span class="req">＊</span></label>
    <input type="email" name="agency_email" required>

    <div class="grp">店舗情報</div>
    <label>店名 <span class="req">＊</span></label>
    <input type="text" name="store_name" required>
    <label>エリア（都道府県） <span class="req">＊</span></label>
    <input type="text" name="pref" required>
    <label>エリア（小エリア） <span class="hint">任意</span></label>
    <input type="text" name="area">
    <label>店舗電話番号 <span class="req">＊</span></label>
    <input type="tel" name="store_phone" required>
    <label>店舗メールアドレス <span class="hint">任意</span></label>
    <input type="email" name="store_email">

    <div class="grp">エステ魂管理情報</div>
    <label>ID <span class="req">＊</span></label>
    <input type="text" name="estama_id" required>
    <label>PW <span class="req">＊</span></label>
    <input type="text" name="estama_pw" required>

    <div class="grp">契約・更新設定</div>
    <label>契約プラン <span class="req">＊</span></label>
    <div class="radios">
      <label><input type="radio" name="plan" value="限定" required>限定</label>
      <label><input type="radio" name="plan" value="通常">通常</label>
    </div>
    <label>更新稼働時間 <span class="req">＊</span> <span class="hint">例: 9:30〜翌3:00（24時間表示）</span></label>
    <input type="text" name="update_hours" placeholder="9:30〜翌3:00" required>
    <label>リアルタイム集客更新用記号 <span class="hint">任意・集客テンプレの選択キーワード</span></label>
    <input type="text" name="promo_symbol">
    <label>リアルタイム求人更新用希望 <span class="hint">任意・求人テンプレの選択キーワード</span></label>
    <input type="text" name="recruit_pref">

    <input class="hp" type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true">
    <button type="submit" id="btn">送信する</button>
    <div class="msg" id="msg"></div>
  </form>
</div>
<script>
const f = document.getElementById('f'), btn = document.getElementById('btn'), msg = document.getElementById('msg');
f.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg'; msg.textContent = '';
  btn.disabled = true; btn.textContent = '送信中...';
  const data = Object.fromEntries(new FormData(f).entries());
  try {
    const r = await fetch('/api/agency-intake', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
    });
    const j = await r.json();
    if (r.ok && j.ok) {
      f.reset();
      msg.className = 'msg ok';
      msg.textContent = '送信が完了しました。担当より追ってご連絡いたします。';
    } else {
      msg.className = 'msg err';
      msg.textContent = j.error || '送信に失敗しました。入力内容をご確認ください。';
    }
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
  } finally {
    btn.disabled = false; btn.textContent = '送信する';
  }
});
</script>
</body>
</html>
