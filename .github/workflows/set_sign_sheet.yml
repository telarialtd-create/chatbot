name: Set SIGN_SHEET env on VPS (one-time)

on:
  workflow_dispatch: {}

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.225.82.240 >> ~/.ssh/known_hosts

      - name: Set SIGN_SHEET_ID and SIGN_SHEET_TAB in .env
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.225.82.240 << 'EOF'
          ENV_FILE=/app/chatbot/.env

          # SIGN_SHEET_ID
          if grep -q '^SIGN_SHEET_ID=' "$ENV_FILE"; then
            sed -i 's|^SIGN_SHEET_ID=.*|SIGN_SHEET_ID=1r3vXwm3I6VZEGOckt9EdRJX_85VOR5lKiXHkbu9iVjU|' "$ENV_FILE"
          else
            echo 'SIGN_SHEET_ID=1r3vXwm3I6VZEGOckt9EdRJX_85VOR5lKiXHkbu9iVjU' >> "$ENV_FILE"
          fi

          # SIGN_SHEET_TAB
          if grep -q '^SIGN_SHEET_TAB=' "$ENV_FILE"; then
            sed -i 's|^SIGN_SHEET_TAB=.*|SIGN_SHEET_TAB=シート1|' "$ENV_FILE"
          else
            echo 'SIGN_SHEET_TAB=シート1' >> "$ENV_FILE"
          fi

          echo "設定完了:"
          grep 'SIGN_SHEET' "$ENV_FILE"
          EOF

      - name: Reload chatbot
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.225.82.240 \
            "pm2 reload chatbot --update-env && echo '✅ pm2 reload完了'"
