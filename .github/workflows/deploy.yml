name: Deploy JS to Hetzner (LINE server 46.225.82.240)

on:
  push:
    branches: [ main ]
    paths:
      # 本番運用JSファイル（手動check/fix系は監視対象外）
      - 'app.js'
      - 'line_handler.js'
      - 'line_nippo_input.js'
      - 'nippo_to_geppo.js'
      - 'nippo_to_geppo_v2.js'
      - 'create_sb_dashboard.js'
      - 'scheduleReader.js'
      - 'build_dashboard.js'
      - 'customer_search.js'
      - 'meisai_handler.js'
      - 'kokyaku_update.js'
      - 'geppo_update.js'
      - 'nippo_screenshot.js'
      - 'shift_reflect.js'
      - 'shift_route.js'
      - 'shift_route_date.js'
      - 'sync_monthly_overlap.js'
      - 'lib/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.225.82.240 >> ~/.ssh/known_hosts

      - name: Deploy JS files to server
        run: |
          # 本番運用JSファイルをサーバーにコピー
          for f in app.js line_handler.js line_nippo_input.js nippo_to_geppo.js \
                   nippo_to_geppo_v2.js create_sb_dashboard.js scheduleReader.js \
                   build_dashboard.js customer_search.js meisai_handler.js \
                   kokyaku_update.js geppo_update.js nippo_screenshot.js \
                   shift_reflect.js shift_route.js shift_route_date.js \
                   sync_monthly_overlap.js; do
            if [ -f "$f" ]; then
              scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                "$f" root@46.225.82.240:/app/chatbot/"$f"
              echo "✅ $f → /app/chatbot/$f"
            fi
          done

          # lib/ フォルダ全体を同期（C-043分離成果）
          if [ -d lib ]; then
            rsync -az \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              lib/ root@46.225.82.240:/app/chatbot/lib/
            echo "✅ lib/ → /app/chatbot/lib/ (synced)"
          fi

          # pm2 reload で安全に反映（delete不要・停止1〜3秒）
          # 既存プロセスがあればreload、無ければstart のフォールバック方式
          REMOTE_CMD='set -e; cd /app/chatbot && if pm2 describe chatbot > /dev/null 2>&1; then pm2 reload chatbot --update-env; else pm2 start app.js --name chatbot --update-env; fi; pm2 save; echo "=== post-reload pm2 list ==="; pm2 list'
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.225.82.240 "$REMOTE_CMD"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            https://46.225.82.240.nip.io/api/availability || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
            echo "✅ サーバー正常稼働"
          else
            echo "⚠️ サーバー応答: $STATUS"
          fi
