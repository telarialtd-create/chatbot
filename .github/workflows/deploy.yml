name: Deploy to Hetzner

on:
  push:
    branches: [ main ]
    paths:
      - 'line_handler.js'
      - 'nippo_to_geppo.js'
      - 'scheduleReader.js'
      - 'build_dashboard.js'
      - 'app.js'
      - 'chatbot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 159.69.40.60 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          # 変更されたJSファイルをサーバーにコピー
          for f in line_handler.js nippo_to_geppo.js scheduleReader.js build_dashboard.js; do
            if [ -f "$f" ]; then
              scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                "$f" root@159.69.40.60:/app/chatbot/"$f"
              echo "✅ $f → /app/chatbot/$f"
            fi
          done

          # PM2診断＋完全再起動（cwd/file pathを表示して異常検知）
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@159.69.40.60 << 'REMOTE'
            set -e
            echo '=== pm2 list ==='
            pm2 list
            echo '=== pm2 describe chatbot ==='
            pm2 describe chatbot | grep -E 'script path|exec cwd|status|name|restarts|version' | head -20 || true
            echo '=== /app/chatbot head ==='
            ls -la /app/chatbot/ | head -10
            echo '=== app.js mtime (should be recent) ==='
            stat -c '%y %n' /app/chatbot/app.js /app/chatbot/line_handler.js 2>/dev/null || stat /app/chatbot/app.js /app/chatbot/line_handler.js
            echo '=== pm2 delete & start (force reload) ==='
            pm2 delete chatbot 2>/dev/null || true
            cd /app/chatbot && pm2 start app.js --name chatbot --update-env
            pm2 save
            echo '=== post-restart pm2 list ==='
            pm2 list
REMOTE

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            https://159.69.40.60.nip.io/api/availability || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
            echo "✅ サーバー正常稼働"
          else
            echo "⚠️ サーバー応答: $STATUS"
          fi
