name: ランキングLINE送信（毎日JST 12:00）

on:
  workflow_dispatch: # 手動実行のみ（VPS crontabに移行済み: UTC 03:00 = JST 12:00）

jobs:
  send-ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ランキングをLINE送信
        env:
          LINE_TOKEN:         ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
          ESTAMA_CREA_USER:   ${{ secrets.ESTAMA_CREA_USER }}
          ESTAMA_CREA_PASS:   ${{ secrets.ESTAMA_CREA_PASS }}
        run: |
          python scripts/ranking_check.py
