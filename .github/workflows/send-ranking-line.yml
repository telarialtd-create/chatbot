name: ランキングLINE送信（毎日JST 12:00）

on:
  workflow_dispatch:
    inputs:
      crea_access:
        description: 'CREAの前日アクセス数（VPSから取得）'
        required: false
        default: ''
      fuwa_access:
        description: 'ふわもこSPAの前日アクセス数（VPSから取得）'
        required: false
        default: ''

jobs:
  send-ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ランキングをLINE送信
        env:
          LINE_TOKEN:         ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
          CREA_ACCESS:        ${{ inputs.crea_access }}
          FUWA_ACCESS:        ${{ inputs.fuwa_access }}
        run: |
          python scripts/ranking_check.py
