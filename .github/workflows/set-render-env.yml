name: Set Render Env Var (one-time)

on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set MEISAI_TEST_ID on Render
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/env-vars" \
            -d '[{"key":"MEISAI_TEST_ID","value":"1gMAdEiZI1uuffhX3ot6K_dn4_xZV6bp0FaMTnj5NwUk"}]'
          echo "MEISAI_TEST_ID set"
