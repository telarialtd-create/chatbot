name: Set ADMIN_PASSWORD on VPS (one-time)

on:
  workflow_dispatch: {}

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.225.82.240 >> ~/.ssh/known_hosts

      - name: Add ADMIN_PASSWORD to .env
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.225.82.240 \
            "grep -q '^ADMIN_PASSWORD=' /app/chatbot/.env \
              && sed -i 's/^ADMIN_PASSWORD=.*/ADMIN_PASSWORD=0000/' /app/chatbot/.env \
              || echo 'ADMIN_PASSWORD=0000' >> /app/chatbot/.env; \
             echo 'ADMIN_PASSWORD設定完了'; \
             grep 'ADMIN_PASSWORD' /app/chatbot/.env"

      - name: Reload chatbot
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.225.82.240 \
            "pm2 reload chatbot --update-env && echo '✅ pm2 reload完了'"
