name: 求人SEOチェック（毎朝10時JST）

on:
  schedule:
    # JST 10:00 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - name: SEOチェック実行
        run: |
          curl -s -X POST https://chatbot-z9qe.onrender.com/seo-check \
            -H "x-seo-token: ${{ secrets.SEO_CHECK_TOKEN }}" \
            -H "Content-Type: application/json"
