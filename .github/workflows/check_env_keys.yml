name: Check env keys (one-time)

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.225.82.240 >> ~/.ssh/known_hosts

      - name: Show .env key names (values hidden)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.225.82.240 \
            "grep -oE '^[^=]+' /app/chatbot/.env | sort"
